<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Crosstown Work — Student Onboarding</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-green-50 min-h-screen flex items-center justify-center p-4">
  <div class="bg-white rounded-2xl shadow-lg w-full max-w-md p-8">

    <div class="mb-8 text-center">
      <span class="bg-green-700 text-white text-xs font-bold tracking-widest uppercase px-4 py-1 rounded-full">Crosstown Work</span>
      <h1 class="text-2xl font-extrabold text-green-900 mt-4">Let's find your match</h1>
      <p class="text-green-700 text-sm mt-2">Tell us about yourself and we'll connect you to a paid, degree-matched placement in Boston.</p>
    </div>

    <div class="space-y-4">
      <div>
        <label class="block text-xs font-bold text-green-700 uppercase tracking-wider mb-1">Full Name</label>
        <input type="text" placeholder="Your full name" class="w-full border border-green-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-green-500"/>
      </div>

      <div>
        <label class="block text-xs font-bold text-green-700 uppercase tracking-wider mb-1">Email Address</label>
        <input type="email" placeholder="your@email.com" class="w-full border border-green-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-green-500"/>
      </div>

      <div>
        <label class="block text-xs font-bold text-green-700 uppercase tracking-wider mb-1">Degree Field</label>
        <select class="w-full border border-green-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-green-500">
          <option value="">Select your degree field</option>
          <option>Business / Finance / Economics</option>
          <option>Criminal Justice / Legal / Public Policy</option>
          <option>Healthcare / Biology / Public Health</option>
          <option>Education / Social Work / Psychology</option>
        </select>
      </div>

      <div>
        <label class="block text-xs font-bold text-green-700 uppercase tracking-wider mb-1">Graduation Status</label>
        <select class="w-full border border-green-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-green-500">
          <option value="">Select your status</option>
          <option>Currently enrolled</option>
          <option>Recent graduate (0–1 year)</option>
          <option>Graduate (1–3 years)</option>
        </select>
      </div>

      <div>
        <label class="block text-xs font-bold text-green-700 uppercase tracking-wider mb-1">Weekly Availability</label>
        <select class="w-full border border-green-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-green-500">
          <option value="">Hours available per week</option>
          <option>5–10 hours</option>
          <option>10–20 hours</option>
          <option>20–30 hours</option>
          <option>30–40 hours</option>
        </select>
      </div>

      <button class="w-full bg-green-700 hover:bg-green-800 text-white font-bold py-3 rounded-xl mt-2 transition">
        <a href="match.html">Find My Match →</a>
      </button>
    </div>

    <p class="text-center text-xs text-green-500 mt-6">W-2 employed · Degree-matched · Boston placements</p>
  </div>
</body>
</html>
