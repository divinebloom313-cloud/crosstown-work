<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Crosstown Work | Student Onboarding</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-green-50 min-h-screen flex items-center justify-center p-4">
  <div class="bg-white rounded-2xl shadow-lg w-full max-w-md p-8">
    <div class="mb-8 text-center">
      <span class="bg-green-700 text-white text-xs font-bold tracking-widest uppercase px-4 py-1 rounded-full">Crosstown Work</span>
      <h1 class="text-2xl font-extrabold text-green-900 mt-4">Let's find your match</h1>
      <p class="text-green-700 text-sm mt-2">Tell us about yourself and we'll connect you to degree-matched work.</p>
    </div>
    <div class="space-y-4">
      <div>
        <label class="block text-xs font-bold text-green-700 uppercase tracking-wide mb-1">Full Name</label>
        <input id="full_name" type="text" placeholder="Your full name" class="w-full border border-green-200 rounded-lg px-4 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-green-400"/>
      </div>
      <div>
        <label class="block text-xs font-bold text-green-700 uppercase tracking-wide mb-1">Email</label>
        <input id="email" type="email" placeholder="your@email.com" class="w-full border border-green-200 rounded-lg px-4 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-green-400"/>
      </div>
      <div>
        <label class="block text-xs font-bold text-green-700 uppercase tracking-wide mb-1">Degree Field</label>
        <select id="degree" class="w-full border border-green-200 rounded-lg px-4 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-green-400">
          <option value="">Select your degree</option>
          <option>Business / Finance</option>
          <option>Healthcare / Nursing</option>
          <option>Education / Social Work</option>
          <option>Legal / Government</option>
          <option>Technology / Engineering</option>
          <option>Arts / Communications</option>
          <option>Other</option>
        </select>
      </div>
      <div>
        <label class="block text-xs font-bold text-green-700 uppercase tracking-wide mb-1">Availability</label>
        <select id="availability" class="w-full border border-green-200 rounded-lg px-4 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-green-400">
          <option value="">Select availability</option>
          <option>Weekdays only</option>
          <option>Weekends only</option>
          <option>Evenings only</option>
          <option>Flexible</option>
        </select>
      </div>
      <button onclick="submitForm()" class="block w-full bg-green-700 hover:bg-green-800 text-white font-bold py-3 rounded-xl mt-4 text-sm tracking-wide">
        Find My Match →
      </button>
      <p id="status" class="text-center text-xs text-green-500 mt-2"></p>
    </div>
    <p class="text-center text-xs text-green-500 mt-6">W-2 employed · Degree-matched · Boston area</p>
  </div>

  <script>
    const SUPABASE_URL = 'https://tdjhrecjlcqywykyxqfx.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRkamhyZWNqbGNxeXd5a3l4cWZ4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE4MDQwNDQsImV4cCI6MjA5NzM4MDA0NH0.iXmU-fvWzRMAEVSscMPoZsiAUxHex_ZXxtZNhDU7e_M';

    async function submitForm() {
      const full_name = document.getElementById('full_name').value;
      const email = document.getElementById('email').value;
      const degree = document.getElementById('degree').value;
      const availability = document.getElementById('availability').value;
      const status = document.getElementById('status');

      if (!full_name || !email || !degree || !availability) {
        status.textContent = 'Please fill out all fields.';
        status.style.color = 'red';
        return;
      }

      status.textContent = 'Submitting...';
      status.style.color = 'gray';

      const response = await fetch(`${SUPABASE_URL}/rest/v1/workers`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'apikey': SUPABASE_KEY,
          'Authorization': `Bearer ${SUPABASE_KEY}`,
          'Prefer': 'return=minimal'
        },
        body: JSON.stringify({ 
          Full_name: full_name, 
          Email: email, 
          Degree: degree, 
          Availability: availability 
        })
      });

      if (response.ok) {
        status.textContent = 'Submitted! Redirecting...';
        status.style.color = 'green';
        setTimeout(() => { window.location.href = 'match.html'; }, 1500);
      } else {
        const err = await response.text();
        status.textContent = 'Error: ' + err;
        status.style.color = 'red';
      }
    }
  </script>
</body>
</html>
