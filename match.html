<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Crosstown Work | Your Matches</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-green-50 min-h-screen p-4">
  <div class="max-w-md mx-auto">
    <div class="text-center mb-6 pt-4">
      <span class="bg-green-700 text-white text-xs font-bold tracking-widest uppercase px-4 py-1 rounded-full">Crosstown Work</span>
      <h1 class="text-2xl font-extrabold text-green-900 mt-4">Your Matches</h1>
      <p class="text-green-700 text-sm mt-2">Based on your degree — here are your field-matched placements in Boston.</p>
    </div>
    <div id="matches"></div>
  </div>

  <script>
    const jobs = {
      "Business / Finance": [
        { title: "Billing Assistant", employer: "Boston Medical Center", location: "850 Harrison Ave, Boston MA — South End", hours: "20 hrs/week", wage: "$34.00/hr", badge: "Best Match" },
        { title: "Budget Tracking Assistant", employer: "City of Boston — Mayor's Office", location: "1 City Hall Plaza, Boston MA — Downtown", hours: "25 hrs/week", wage: "$34.00/hr", badge: "Strong Match" },
        { title: "Accounts Payable Clerk", employer: "Brigham and Women's Hospital", location: "75 Francis St, Boston MA — Longwood", hours: "20 hrs/week", wage: "$34.00/hr", badge: "Strong Match" }
      ],
      "Healthcare / Nursing": [
        { title: "Patient Care Coordinator", employer: "Boston Children's Hospital", location: "300 Longwood Ave, Boston MA — Longwood", hours: "20 hrs/week", wage: "$34.00/hr", badge: "Best Match" },
        { title: "Health Records Clerk", employer: "Mass General Hospital", location: "55 Fruit St, Boston MA — West End", hours: "25 hrs/week", wage: "$34.00/hr", badge: "Strong Match" },
        { title: "Community Health Worker", employer: "Boston Public Health Commission", location: "1010 Massachusetts Ave, Boston MA — Roxbury", hours: "20 hrs/week", wage: "$34.00/hr", badge: "Strong Match" }
      ],
      "Education / Social Work": [
        { title: "Program Assistant", employer: "Boston Public Schools", location: "2300 Washington St, Boston MA — Roxbury", hours: "20 hrs/week", wage: "$34.00/hr", badge: "Best Match" },
        { title: "Case Management Assistant", employer: "DHCD — City of Boston", location: "26 Court St, Boston MA — Downtown", hours: "25 hrs/week", wage: "$34.00/hr", badge: "Strong Match" },
        { title: "Youth Program Coordinator", employer: "Boys & Girls Club of Boston", location: "50 Congress St, Boston MA — Roxbury", hours: "20 hrs/week", wage: "$34.00/hr", badge: "Strong Match" }
      ],
      "Legal / Government": [
        { title: "Legal Administrative Assistant", employer: "Suffolk County DA's Office", location: "1 Bulfinch Place, Boston MA — Downtown", hours: "20 hrs/week", wage: "$34.00/hr", badge: "Best Match" },
        { title: "Policy Research Assistant", employer: "City of Boston — City Council", location: "1 City Hall Plaza, Boston MA — Government Center", hours: "25 hrs/week", wage: "$34.00/hr", badge: "Strong Match" },
        { title: "Compliance Clerk", employer: "Massachusetts State Ethics Commission", location: "One Ashburton Place, Boston MA — Downtown", hours: "20 hrs/week", wage: "$34.00/hr", badge: "Strong Match" }
      ],
      "Technology / Engineering": [
        { title: "IT Support Technician", employer: "Boston Public Schools", location: "2300 Washington St, Boston MA — Citywide", hours: "20 hrs/week", wage: "$34.00/hr", badge: "Best Match" },
        { title: "Data Entry Analyst", employer: "Mass General Brigham", location: "399 Revolution Dr, Somerville MA — Assembly Row", hours: "25 hrs/week", wage: "$34.00/hr", badge: "Strong Match" },
        { title: "Systems Support Clerk", employer: "City of Boston — DoIT", location: "1 City Hall Plaza, Boston MA — Downtown", hours: "20 hrs/week", wage: "$34.00/hr", badge: "Strong Match" }
      ],
      "Arts / Communications": [
        { title: "Communications Assistant", employer: "Boston Arts Commission", location: "1 City Hall Plaza, Boston MA — Downtown", hours: "20 hrs/week", wage: "$34.00/hr", badge: "Best Match" },
        { title: "Marketing Coordinator", employer: "Greater Boston Convention & Visitors Bureau", location: "2 Copley Place, Boston MA — Back Bay", hours: "25 hrs/week", wage: "$34.00/hr", badge: "Strong Match" },
        { title: "Media Relations Assistant", employer: "WGBH Boston", location: "1 Guest St, Boston MA — Brighton", hours: "20 hrs/week", wage: "$34.00/hr", badge: "Strong Match" }
      ],
      "Other": [
        { title: "Administrative Assistant", employer: "City of Boston", location: "1 City Hall Plaza, Boston MA — Downtown", hours: "20 hrs/week", wage: "$34.00/hr", badge: "Best Match" },
        { title: "Office Coordinator", employer: "Boston Housing Authority", location: "52 Chauncy St, Boston MA — Downtown", hours: "25 hrs/week", wage: "$34.00/hr", badge: "Strong Match" },
        { title: "Community Liaison", employer: "Boston Neighborhood Network", location: "3025 Washington St, Boston MA — Roxbury", hours: "20 hrs/week", wage: "$34.00/hr", badge: "Strong Match" }
      ]
    };

    const params = new URLSearchParams(window.location.search);
    let degree = params.get('degree') || 'Other';
    const matched = jobs[degree] || jobs['Other'];

    const container = document.getElementById('matches');
    matched.forEach((job, i) => {
      const confirmURL = `confirm.html?job=${encodeURIComponent(job.title)}&employer=${encodeURIComponent(job.employer)}&location=${encodeURIComponent(job.location)}&hours=${encodeURIComponent(job.hours)}`;
      container.innerHTML += `
        <div class="bg-white rounded-2xl shadow p-6 mb-4 border-l-4 ${i === 0 ? 'border-green-600' : 'border-green-200'}">
          <div class="flex justify-between items-start mb-2">
            <span class="bg-green-100 text-green-700 text-xs font-bold px-3 py-1 rounded-full">${job.badge}</span>
            <span class="text-green-800 font-extrabold text-lg">${job.wage}</span>
          </div>
          <h2 class="font-extrabold text-green-900 text-xl mt-2">${job.title}</h2>
          <p class="text-green-600 font-semibold text-sm mb-2">${job.employer}</p>
          <p class="text-gray-500 text-xs mb-3">${job.location}</p>
          <div class="flex flex-wrap gap-2 mb-4">
            <span class="border border-green-200 text-green-700 text-xs px-3 py-1 rounded-full">${job.hours}</span>
            <span class="border border-green-200 text-green-700 text-xs px-3 py-1 rounded-full">W-2 Employed</span>
          </div>
          <a href="${confirmURL}" class="block w-full bg-green-700 hover:bg-green-800 text-white font-bold py-3 rounded-xl text-center text-sm">Select This Placement →</a>
        </div>`;
    });
  </script>
</body>
</html>
