<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Crosstown Work | Your Matches</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-green-50 min-h-screen p-4">
  <div class="max-w-md mx-auto">
    <div class="text-center mb-6 pt-4">
      <span class="bg-green-700 text-white text-xs font-bold tracking-widest uppercase px-4 py-1 rounded-full">Crosstown Work</span>
      <h1 class="text-2xl font-extrabold text-green-900 mt-4">Your Matches</h1>
      <p class="text-green-700 text-sm mt-2">Based on your degree — here are your field-matched placements in Boston.</p>
    </div>
    <div id="matches"></div>
  </div>

  <script>
    const jobs = {
      "Business / Finance": [
        { title: "Billing Assistant", employer: "Boston Medical Center", location: "850 Harrison Ave, Boston MA — South End", desc: "Support the billing team with insurance verification, records entry, and patient account coordination.", hours: "20 hrs/week", badge: "Best Match" },
        { title: "Budget Tracking Assistant", employer: "City of Boston — Mayor's Office", location: "1 City Hall Plaza, Boston MA — Downtown", desc: "Help track departmental spending, prepare budget summaries, and support financial reporting.", hours: "25 hrs/week", badge: "Strong Match" },
        { title: "Accounts Payable Clerk", employer: "Brigham and Women's Hospital", location: "75 Francis St, Boston MA — Longwood", desc: "Process invoices, reconcile accounts, and support the finance team with data entry and reporting.", hours: "20 hrs/week", badge: "Strong Match" }
      ],
      "Healthcare / Nursing": [
        { title: "Patient Care Coordinator", employer: "Boston Children's Hospital", location: "300 Longwood Ave, Boston MA — Longwood", desc: "Coordinate patient appointments, manage records, and support clinical staff with administrative tasks.", hours: "20 hrs/week", badge: "Best Match" },
        { title: "Health Records Clerk", employer: "Mass General Hospital", location: "55 Fruit St, Boston MA — West End", desc: "Maintain and organize patient health records, assist with data entry and record retrieval.", hours: "25 hrs/week", badge: "Strong Match" },
        { title: "Community Health Worker", employer: "Boston Public Health Commission", location: "1010 Massachusetts Ave, Boston MA — Roxbury", desc: "Connect residents to health resources, conduct outreach, and support wellness programs.", hours: "20 hrs/week", badge: "Strong Match" }
      ],
      "Education / Social Work": [
        { title: "Program Assistant", employer: "Boston Public Schools", location: "2300 Washington St, Boston MA — Roxbury", desc: "Support teachers and program coordinators with administrative tasks, data entry, and student engagement.", hours: "20 hrs/week", badge: "Best Match" },
        { title: "Case Management Assistant", employer: "DHCD — City of Boston", location: "26 Court St, Boston MA — Downtown", desc: "Assist case managers with documentation, client intake, and resource coordination for housing programs.", hours: "25 hrs/week", badge: "Strong Match" },
        { title: "Youth Program Coordinator", employer: "Boys & Girls Club of Boston", location: "50 Dudley St, Boston MA — Roxbury", desc: "Plan and support youth programs, track attendance, and coordinate with program staff.", hours: "20 hrs/week", badge: "Strong Match" }
      ],
      "Legal / Government": [
        { title: "Legal Administrative Assistant", employer: "Suffolk County DA's Office", location: "1 Bulfinch Place, Boston MA — Downtown", desc: "Support attorneys with document preparation, filing, scheduling, and case tracking.", hours: "20 hrs/week", badge: "Best Match" },
        { title: "Policy Research Assistant", employer: "City of Boston — City Council", location: "1 City Hall Plaza, Boston MA — Government Center", desc: "Research legislation, prepare briefing documents, and support council staff with policy analysis.", hours: "25 hrs/week", badge: "Strong Match" },
        { title: "Compliance Clerk", employer: "Massachusetts State Ethics Commission", location: "One Ashburton Place, Boston MA — Downtown", desc: "Support compliance reviews, maintain filing systems, and assist with regulatory documentation.", hours: "20 hrs/week", badge: "Strong Match" }
      ],
      "Technology / Engineering": [
        { title: "IT Support Technician", employer: "Boston Public Schools", location: "2300 Washington St, Boston MA — Roxbury", desc: "Provide technical support to staff and students, troubleshoot hardware and software issues.", hours: "20 hrs/week", badge: "Best Match" },
        { title: "Data Entry Analyst", employer: "Mass General Brigham", location: "399 Revolution Dr, Somerville MA — Assembly Row", desc: "Support data teams with entry, validation, and quality checks across clinical databases.", hours: "25 hrs/week", badge: "Strong Match" },
        { title: "Systems Support Clerk", employer: "City of Boston — DoIT", location: "1 City Hall Plaza, Boston MA — Downtown", desc: "Assist the technology department with system documentation, user support, and ticket tracking.", hours: "20 hrs/week", badge: "Strong Match" }
      ],
      "Arts / Communications": [
        { title: "Communications Assistant", employer: "Boston Arts Commission", location: "1 City Hall Plaza, Boston MA — Downtown", desc: "Support communications team with content creation, social media, and event coordination.", hours: "20 hrs/week", badge: "Best Match" },
        { title: "Marketing Coordinator", employer: "Greater Boston Convention & Visitors Bureau", location: "2 Copley Place, Boston MA — Back Bay", desc: "Assist with marketing campaigns, content scheduling, and community outreach materials.", hours: "25 hrs/week", badge: "Strong Match" },
        { title: "Media Relations Assistant", employer: "WGBH Boston", location: "1 Guest St, Boston MA — Brighton", desc: "Support the communications team with press materials, media tracking, and event logistics.", hours: "20 hrs/week", badge: "Strong Match" }
      ],
      "Other": [
        { title: "Administrative Assistant", employer: "City of Boston", location: "1 City Hall Plaza, Boston MA — Downtown", desc: "Provide general administrative support including scheduling, filing, and correspondence.", hours: "20 hrs/week", badge: "Best Match" },
        { title: "Office Coordinator", employer: "Boston Housing Authority", location: "52 Chauncy St, Boston MA — Downtown", desc: "Support office operations, manage intake forms, and assist staff with daily administrative tasks.", hours: "25 hrs/week", badge: "Strong Match" },
        { title: "Community Liaison", employer: "Boston Neighborhood Network", location: "3025 Washington St, Boston MA — Roxbury", desc: "Connect community members to services, coordinate outreach events, and maintain records.", hours: "20 hrs/week", badge: "Strong Match" }
      ]
    };

    const params = new URLSearchParams(window.location.search);
    let degree = params.get('degree') || 'Other';
    const matched = jobs[degree] || jobs['Other'];

    const container = document.getElementById('matches');
    matched.forEach((job, i) => {
      const confirmUrl = `confirm.html?job=${encodeURIComponent(job.title)}&employer=${encodeURIComponent(job.employer)}&location=${encodeURIComponent(job.location)}&hours=${encodeURIComponent(job.hours)}`;
      container.innerHTML += `
        <div class="bg-white rounded-2xl shadow p-6 mb-4 border-l-4 ${i === 0 ? 'border-green-600' : 'border-green-200'}">
          <div class="flex justify-between items-start mb-2">
            <span class="bg-green-100 text-green-700 text-xs font-bold px-3 py-1 rounded-full">${job.badge}</span>
            <span class="text-green-800 font-extrabold text-lg">$34.00/hr</span>
          </div>
          <h2 class="font-extrabold text-green-900 text-xl mt-2">${job.title}</h2>
          <p class="text-green-600 font-semibold text-sm mb-2">${job.employer}</p>
          <p class="text-gray-600 text-sm mb-3">${job.desc}</p>
          <div class="flex flex-wrap gap-2 mb-4">
            <span class="border border-green-200 text-green-700 text-xs px-3 py-1 rounded-full">${job.hours}</span>
            <span class="border border-green-200 text-green-700 text-xs px-3 py-1 rounded-full">W-2 Employed</span>
          </div>
          <a href="${confirmUrl}" class="block w-full bg-green-700 hover:bg-green-800 text-white font-bold py-3 rounded-xl text-center text-sm">Select This Placement →</a>
        </div>`;
    });
  </script>
</body>
</html>
